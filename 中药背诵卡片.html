<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f3eb" media="(prefers-color-scheme:light)">
<meta name="theme-color" content="#1a1614" media="(prefers-color-scheme:dark)">
<title>本草卡片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
<style>
:root{
--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
--bg:#f7f3eb;--bg2:#f0ebe0;--card:#faf8f3;--card-border:#e2d6c1;
--ink:#2d2520;--ink2:#5c4f42;--ink3:#8a7d6d;--ink4:#b5aa98;
--vermilion:#b5453a;--vermilion-soft:#d4756a;--jade:#4a8c6f;--jade-soft:#7ab89e;
--amber:#c9943a;--sky:#5a8db5;
--shadow-sm:0 1px 3px rgba(45,37,32,.06);
--shadow-md:0 4px 16px rgba(45,37,32,.08);
--shadow-lg:0 8px 32px rgba(45,37,32,.12);
--radius:16px;--radius-sm:10px;--radius-xs:6px;
--font:"LXGW WenKai","Noto Serif SC","Songti SC","SimSun",serif;
--font-ui:"LXGW WenKai",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
}
@media(prefers-color-scheme:dark){:root{
--bg:#1a1614;--bg2:#252120;--card:#2a2522;--card-border:#3d3530;
--ink:#e8e0d4;--ink2:#c4b9a8;--ink3:#8a7d6d;--ink4:#5c4f42;
--vermilion:#d4756a;--vermilion-soft:#b5453a;--jade:#7ab89e;--jade-soft:#4a8c6f;
--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.25);--shadow-lg:0 8px 32px rgba(0,0,0,.35);
}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);min-height:100vh;min-height:100dvh;overscroll-behavior-y:contain;
background-image:radial-gradient(ellipse at 20% 0%,rgba(181,69,58,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(74,140,111,.03) 0%,transparent 50%)}
.app{max-width:520px;margin:0 auto;padding:calc(8px + var(--st)) 14px calc(20px + var(--sb));min-height:100dvh;display:flex;flex-direction:column}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:8px;min-width:0}
.hdr h1{font-family:var(--font);font-size:22px;font-weight:700;color:var(--vermilion);white-space:nowrap;letter-spacing:.5px}
.hdr .cnt{font-size:11px;color:var(--ink3);white-space:nowrap}
.ring-wrap{flex-shrink:0;display:flex;align-items:center;gap:8px}
.ring-wrap .pct{font-size:13px;font-weight:700;color:var(--ink2)}
.ring{width:36px;height:36px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:3}
.ring-fg{fill:none;stroke:var(--jade);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}

/* 3-TAB BAR */
.tabs3{display:flex;gap:3px;padding:2px;background:var(--bg2);border-radius:12px;margin-bottom:10px}
.tab3{flex:1;padding:9px 0;border:none;background:none;border-radius:10px;font-family:var(--font-ui);font-size:14px;color:var(--ink3);cursor:pointer;transition:all .25s;touch-action:manipulation}
.tab3.on{background:var(--card);color:var(--ink);font-weight:700;box-shadow:var(--shadow-sm)}

/* SUB-MODE TOGGLES */
.sub-modes{display:flex;gap:3px;padding:2px;background:var(--bg2);border-radius:8px;margin-bottom:8px}
.sub-tab{flex:1;padding:6px 0;border:none;background:none;border-radius:6px;font-family:var(--font-ui);font-size:12px;color:var(--ink3);cursor:pointer;transition:all .2s;touch-action:manipulation}
.sub-tab.on{background:var(--card);color:var(--vermilion);font-weight:700;box-shadow:var(--shadow-sm)}

/* CATEGORY/SCOPE STRIP */
.cats-wrap{position:relative;margin-bottom:10px}
.cats{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0}
.cats::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--card-border);background:var(--card);font-family:var(--font-ui);font-size:12px;color:var(--ink3);cursor:pointer;transition:all .2s;touch-action:manipulation;white-space:nowrap}
.cpill.on{background:var(--vermilion);color:#fff;border-color:var(--vermilion);font-weight:700}
.cpill.weak-pill{border-color:rgba(181,69,58,.3)}
.cpill.weak-pill.on{background:var(--vermilion);border-color:var(--vermilion)}
.cats-fade{position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,var(--bg));pointer-events:none}

/* INFO BAR */
.info{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:8px;padding:0 2px}

/* CARD 3D FLIP */
.card-scene{flex:1;perspective:800px;min-height:240px;margin-bottom:14px}
.card{width:100%;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);padding:28px 22px;box-shadow:var(--shadow-md);border:1px solid var(--card-border);background:var(--card);overflow-y:auto;display:flex;flex-direction:column}
.card-face.back{transform:rotateY(180deg)}
.front-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink3);margin-bottom:auto;padding-bottom:4px}
.front-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--vermilion);opacity:.6}
.front-name{font-family:"Noto Serif SC",var(--font);font-size:clamp(40px,10vw,56px);font-weight:900;color:var(--ink);text-align:center;margin:16px 0;line-height:1.1;letter-spacing:2px}
.front-effect{font-family:var(--font);font-size:clamp(15px,3.6vw,18px);line-height:1.8;color:var(--ink2);text-align:center;padding:0 8px}
.front-hint{text-align:center;font-size:11px;color:var(--ink4);margin-top:auto;padding-top:16px}
.back-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.back-name{font-family:"Noto Serif SC",var(--font);font-size:clamp(24px,6vw,32px);font-weight:900;color:var(--vermilion)}
.back-sub{font-size:11px;color:var(--ink3);background:var(--bg2);padding:2px 8px;border-radius:4px}
.back-dose{font-size:11px;color:var(--amber);background:rgba(201,148,58,.1);padding:2px 8px;border-radius:4px;margin-left:auto}
.section{margin-bottom:16px}
.sec-label{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sec-label::before{content:'';width:3px;height:12px;border-radius:2px}
.sec-label.eff{color:var(--jade)}.sec-label.eff::before{background:var(--jade)}
.sec-label.ind{color:var(--sky)}.sec-label.ind::before{background:var(--sky)}
.sec-text{font-family:var(--font);font-size:clamp(14px,3.2vw,16px);line-height:1.8;color:var(--ink)}
.sec-text.sm{font-size:clamp(13px,3vw,15px)}
.back-hint{text-align:center;font-size:11px;color:var(--ink4);margin-top:auto;padding-top:12px}

/* STATIC CARD */
.scard{background:var(--card);border-radius:var(--radius);padding:24px 20px;box-shadow:var(--shadow-md);border:1px solid var(--card-border);flex:1;overflow-y:auto;min-height:240px}

/* QUIZ (写药名) */
.q-prompt{font-size:13px;font-weight:600;color:var(--ink3);text-align:center;margin-bottom:14px;padding:8px 0;border-bottom:1px dashed var(--card-border)}
.q-sec{margin-bottom:14px}
.q-row{display:flex;gap:8px;align-items:center;margin-top:12px}
.q-input{flex:1;min-width:0;padding:12px 16px;border-radius:var(--radius-sm);border:2px solid var(--card-border);font-size:18px;font-family:var(--font);outline:none;background:var(--bg);color:var(--ink);transition:border-color .2s;min-height:48px;-webkit-appearance:none}
.q-input:focus{border-color:var(--vermilion)}
.q-input.ok{border-color:var(--jade);background:rgba(74,140,111,.06)}
.q-input.no{border-color:var(--vermilion);background:rgba(181,69,58,.06)}
.q-btn{flex-shrink:0;padding:12px 20px;border-radius:var(--radius-sm);border:none;background:var(--vermilion);color:#fff;font-size:15px;font-weight:700;font-family:var(--font-ui);cursor:pointer;min-height:48px;touch-action:manipulation;transition:all .15s}
.q-btn:active{transform:scale(.96);opacity:.85}
.q-result{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-size:15px;text-align:center;font-weight:700}
.q-result.ok{background:rgba(74,140,111,.1);color:var(--jade);border:1px solid rgba(74,140,111,.3)}
.q-result.no{background:rgba(181,69,58,.1);color:var(--vermilion);border:1px solid rgba(181,69,58,.3)}
.dose-btn{margin-top:10px;background:none;border:none;color:var(--ink3);font-size:12px;cursor:pointer;font-family:var(--font-ui);padding:4px 0}
.dose-box{margin-top:6px;font-size:12px;color:var(--amber);line-height:1.6;padding:8px 12px;background:rgba(201,148,58,.08);border-radius:var(--radius-xs);border:1px solid rgba(201,148,58,.15)}

/* REVERSE (写功效 - self grade) */
.rv-name{font-family:"Noto Serif SC",var(--font);font-size:clamp(36px,9vw,48px);font-weight:900;color:var(--ink);text-align:center;margin:12px 0 6px;letter-spacing:2px}
.rv-sub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:16px}
.rv-prompt{font-size:13px;color:var(--ink3);text-align:center;margin-bottom:12px}
.rv-reveal{width:100%;padding:14px;border-radius:var(--radius-sm);border:2px dashed var(--card-border);background:var(--bg);color:var(--ink2);font-family:var(--font);font-size:14px;line-height:1.7;cursor:pointer;text-align:center;transition:all .2s;min-height:48px;touch-action:manipulation;margin-bottom:12px}
.rv-reveal:hover{border-color:var(--vermilion);color:var(--ink)}
.rv-reveal.shown{border-style:solid;border-color:var(--card-border);background:var(--bg2);cursor:default;text-align:left}
.rv-grade{display:flex;gap:8px;margin-top:12px}
.rv-grade button{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:700;font-family:var(--font-ui);cursor:pointer;min-height:48px;touch-action:manipulation}
.rv-grade .g-ok{background:var(--jade);color:#fff}
.rv-grade .g-no{background:var(--vermilion);color:#fff}
.rv-grade button:active{transform:scale(.96);opacity:.85}

/* TYPE BADGE for random mode */
.type-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:8px;font-weight:700}
.type-badge.quiz{background:rgba(74,140,111,.12);color:var(--jade)}
.type-badge.rv{background:rgba(90,141,181,.12);color:var(--sky)}

/* NAV BUTTONS */
.nav{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.nbtn{padding:11px 16px;border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-ui);cursor:pointer;transition:all .15s;touch-action:manipulation;min-height:46px;display:flex;align-items:center;justify-content:center;gap:4px;flex:1;max-width:140px}
.nbtn.outline{border:1px solid var(--card-border);background:var(--card);color:var(--ink)}
.nbtn.red{border:none;background:var(--vermilion);color:#fff;font-weight:700}
.nbtn.green{border:none;background:var(--jade);color:#fff;font-weight:700}
.nbtn.primary{border:none;background:var(--vermilion);color:#fff;font-weight:700}
.nbtn:active{transform:scale(.96);opacity:.85}

/* STATS */
.stats{display:flex;justify-content:space-around;padding:14px;background:var(--bg2);border-radius:var(--radius);text-align:center;margin-top:auto}
.s-num{font-size:20px;font-weight:700;font-family:var(--font)}
.s-label{font-size:10px;color:var(--ink3);margin-top:2px}
.s-jade{color:var(--jade)}.s-red{color:var(--vermilion)}.s-mute{color:var(--ink3)}.s-acc{color:var(--amber)}

/* ===== PROGRESS DASHBOARD ===== */
.dash-section{margin-bottom:20px}
.dash-title{font-family:"Noto Serif SC",var(--font);font-size:16px;font-weight:900;color:var(--vermilion);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dash-title::before{content:'';width:3px;height:16px;background:var(--vermilion);border-radius:2px}
.streak-row{display:flex;gap:10px;margin-bottom:20px}
.streak-card{flex:1;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 12px;text-align:center}
.streak-num{font-size:28px;font-weight:900;font-family:"Noto Serif SC",var(--font)}
.streak-label{font-size:11px;color:var(--ink3);margin-top:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-day{aspect-ratio:1;border-radius:4px;background:var(--bg2);position:relative;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink4)}
.cal-day.studied{background:rgba(74,140,111,.25);color:var(--jade)}
.cal-day.studied-high{background:rgba(74,140,111,.45);color:var(--jade)}
.cal-day.today{outline:2px solid var(--vermilion);outline-offset:1px}
.cal-day.empty{opacity:.3}
.cal-legend{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);margin-bottom:4px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;text-align:center;font-size:9px;color:var(--ink4)}
.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px}
.cat-bar-name{width:90px;flex-shrink:0;color:var(--ink2);font-family:var(--font);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-track{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;background:var(--jade);transition:width .4s ease}
.cat-bar-pct{width:36px;flex-shrink:0;text-align:right;color:var(--ink3);font-size:11px}
.weak-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.weak-pill{padding:5px 12px;border-radius:16px;font-size:12px;font-family:var(--font-ui);background:rgba(181,69,58,.08);color:var(--vermilion);border:1px solid rgba(181,69,58,.2)}
.weak-empty{text-align:center;color:var(--ink3);font-size:13px;padding:20px 0}
.dash-actions{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap}
.dash-btn{padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font-ui);cursor:pointer;transition:all .15s;touch-action:manipulation;min-height:42px;border:1px solid var(--card-border);background:var(--card);color:var(--ink);display:flex;align-items:center;justify-content:center;gap:4px;flex:1}
.dash-btn.danger{border-color:rgba(181,69,58,.3);color:var(--vermilion);background:rgba(181,69,58,.05)}
.dash-btn:active{transform:scale(.97);opacity:.85}

/* ANIMATIONS */
.card-scene.slide-l .card{animation:sL .28s ease-out}
.card-scene.slide-r .card{animation:sR .28s ease-out}
.scard.slide-l{animation:sL .28s ease-out}
.scard.slide-r{animation:sR .28s ease-out}
@keyframes sL{from{transform:translateX(50px);opacity:.4}to{transform:translateX(0);opacity:1}}
@keyframes sR{from{transform:translateX(-50px);opacity:.4}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn .35s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-height:600px)and(orientation:landscape){.app{padding-top:4px}.card-scene{min-height:170px}.card,.card-face{min-height:170px;padding:16px}.front-name{font-size:32px;margin:8px 0}.hdr h1{font-size:18px}}
@media(max-width:420px){.q-btn{padding:12px 14px}.q-input{font-size:16px;padding:12px 12px}}
@media(min-width:420px){.nbtn{padding:12px 20px;font-size:15px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ============================================================
// 本草卡片 v1.4.1 — 中药背诵学习工具
// 适配：2026年中医执业医师资格考试 · 中药学184味
// ============================================================
// Changelog:
// v1.4.1 (2026-06-15)
//   - 修复：重置进度后刷新页面数据恢复（关键Bug）
//     根因：saveProg()从S读取kn/uk覆盖P，而S.kn/S.uk在saveProg之后才被清空
//     导致localStorage写入的仍是旧数据，刷新后loadProg恢复旧进度
//     修复：将S.kn/S.uk清空移到saveProg()之前
// v1.4.0 (2026-06-15)
//   - 重构：抽取 resetUI() 函数，消除7处重复的状态重置逻辑
// v1.3.3 (2026-06-15)
//   - 修复：手机端默写输入框溢出屏幕，确认按钮被挤出可视区域
//     根因：.q-input缺少min-width:0，flex子元素无法缩小到内容宽度以下
// v1.3.2 (2026-06-15)
//   - 优化：练习随机模式改为真随机（Math.random），替代原先基于ID奇偶的固定映射
//     新增S.rtype状态字段，仅在导航（goNext/goPrev）时刷新，避免渲染抖动
// v1.3.1 (2026-06-15)
//   - 修复：重置进度后界面状态未同步清空，导致卡片停留在原位
//     根因：reset处理仅重置S.kn/S.uk，未重置S.idx/S.flip等UI状态
// v1.3.0 (2026-06-15)
//   - 修复：浏览模式"不熟"/"掌握"按钮点击后不跳转下一张卡片
//     根因：markHerb()仅更新状态未调用goNext()，导致卡片原地刷新
//   - 修复：练习标签点击无响应，增强事件委托健壮性
//   - 修复：薄弱范围下标记后索引越界导致卡片不更新
// v1.2.0 (2026-06-15)
//   - 新增：版本号与更新日志管理
// v1.1.0 (2026-06-15)
//   - 三标签布局（浏览/练习/进度）
//   - 练习子模式：写药名、写功效（自评）、随机混合
//   - 薄弱药材范围筛选器
//   - 进度仪表盘：打卡日历、分类统计、薄弱列表、导出/导入
//   - localStorage自动保存学习进度
//   - 暗色模式支持（prefers-color-scheme）
//   - 触控滑动、键盘快捷键
// v1.0.0 (2026-06-14)
//   - 初始版本：184味中药翻转卡片
//   - 分类筛选、掌握/不熟标记
// ============================================================
const D=[
{id:1,name:"麻黄",cat:"解表药",sub:"发散风寒药",effect:"发汗散寒，宣肺平喘，利水消肿",indication:"风寒感冒；喘咳胸闷；风水水肿；风寒痹证、阴疽、痰核",dose:"煎服2～10g"},
{id:2,name:"桂枝",cat:"解表药",sub:"发散风寒药",effect:"发汗解肌，温经通脉，助阳化气，平冲降气",indication:"风寒感冒；寒凝血滞诸痛证；痰饮、水肿；心悸、奔豚",dose:"孕妇及月经过多者慎用"},

// ===== PERSISTENCE =====
const KEY="bencao_v2";
function loadProg(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s)}catch(e){}return{kn:[],uk:[],days:{},streak:0,last:null}}
function saveProg(){P.kn=[...S.kn];P.uk=[...S.uk];localStorage.setItem(KEY,JSON.stringify(P))}
function today(){return new Date().toISOString().slice(0,10)}
function recordStudy(n){const d=today();if(!P.days[d])P.days[d]={n:0};P.days[d].n+=n;const yd=new Date();yd.setDate(yd.getDate()-1);const yds=yd.toISOString().slice(0,10);if(P.last!==d){if(P.last===yds)P.streak++;else P.streak=1;P.last=d}saveProg()}
let P=loadProg();

// ===== STATE =====
const cats=["全部",...new Set(D.map(h=>h.cat))];
const C=2*Math.PI*15;
const scopeCats=["全部","薄弱",...cats.filter(c=>c!=="全部")];

let S={
  mode:"browse", // browse | practice | progress
  sub:"quiz",    // quiz | reverse | random (practice only)
  scope:"全部",  // 全部 | 薄弱 | category name
  idx:0, flip:false,
  kn:new Set(P.kn), uk:new Set(P.uk),
  qi:"", qr:null, dose:false,
  rvShow:false, anim:"",
  rtype:Math.random()>.5?"quiz":"reverse" // 随机模式的题型（导航时刷新）
};

function filtered(){
  if(S.scope==="薄弱") return D.filter(h=>S.uk.has(h.id));
  if(S.scope==="全部") return D;
  return D.filter(h=>h.cat===S.scope);
}
function herb(){const f=filtered();return f.length?f[S.idx%f.length]:D[0]}
function qType(h){return S.sub==="random"?S.rtype:S.sub}
function stats(cat){
  const f=cat?D.filter(h=>h.cat===cat):D,t=f.length;
  const k=f.filter(x=>S.kn.has(x.id)).length,u=f.filter(x=>S.uk.has(x.id)).length;
  return{t,k,u,p:t?Math.round(((k+u)/t)*100):0}
}
function ring(pct){const off=C*(1-pct/100);return`<svg class="ring" viewBox="0 0 40 40"><circle class="ring-bg" cx="20" cy="20" r="15"/><circle class="ring-fg" cx="20" cy="20" r="15" stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg>`}

// ===== RENDER =====
function R(){
  const f=filtered(),h=herb(),s=stats(),a=document.getElementById("app"),an=S.anim?` ${S.anim}`:"";
  let o=`<div class="hdr"><div class="hdr-left"><h1>本草卡片</h1><span class="cnt">${D.length}味</span></div><div class="ring-wrap">${ring(s.p)}<span class="pct">${s.p}%</span></div></div>`;

  // 3 main tabs
  o+=`<div class="tabs3">`;
  [["browse","浏览"],["practice","练习"],["progress","进度"]].forEach(([k,l])=>{
    o+=`<button class="tab3${S.mode===k?" on":""}" data-a="mode" data-v="${k}">${l}</button>`
  });
  o+=`</div>`;

  // ===== BROWSE =====
  if(S.mode==="browse"){
    // Categories
    o+=`<div class="cats-wrap"><div class="cats">`;
    cats.forEach(c=>{o+=`<button class="cpill${S.scope===c?" on":""}" data-a="scope" data-v="${c}">${c}</button>`});
    o+=`</div><div class="cats-fade"></div></div>`;
    o+=`<div class="info"><span>第 ${S.idx+1}/${s.t} 味</span><span>掌握 ${s.k} · 待巩固 ${s.u}</span></div>`;
    o+=`<div class="card-scene${an}"><div class="card${S.flip?" flipped":""}" data-a="flip">`;
    o+=`<div class="card-face front"><div class="front-tag"><span class="dot"></span>${h.cat} · ${h.sub}</div><div class="front-name">${h.name}</div><div class="front-effect">${h.effect}</div><div class="front-hint">轻点翻转 →</div></div>`;
    o+=`<div class="card-face back"><div class="back-head"><span class="back-name">${h.name}</span><span class="back-sub">${h.cat}</span>${h.dose?`<span class="back-dose">${h.dose}</span>`:""}</div><div class="section"><div class="sec-label eff">功效</div><div class="sec-text">${h.effect}</div></div><div class="section"><div class="sec-label ind">主治</div><div class="sec-text sm">${h.indication}</div></div><div class="back-hint">← 轻点翻回</div></div>`;
    o+=`</div></div>`;
    o+=`<div class="nav"><button class="nbtn outline" data-a="prev">← 上</button><button class="nbtn red" data-a="uk">不熟</button><button class="nbtn green" data-a="kn">掌握</button><button class="nbtn outline" data-a="next">下 →</button></div>`;
  }

  // ===== PRACTICE =====
  else if(S.mode==="practice"){
    // Scope filter
    o+=`<div class="cats-wrap"><div class="cats">`;
    scopeCats.forEach(c=>{
      const isWeak=c==="薄弱";
      const badge=isWeak&&S.uk.size?` (${S.uk.size})`:"";
      o+=`<button class="cpill${isWeak?" weak-pill":""}${S.scope===c?" on":""}" data-a="scope" data-v="${c}">${c}${badge}</button>`
    });
    o+=`</div><div class="cats-fade"></div></div>`;
    // Sub-mode toggles
    o+=`<div class="sub-modes">`;
    [["quiz","写药名"],["reverse","写功效"],["random","随机"]].forEach(([k,l])=>{
      o+=`<button class="sub-tab${S.sub===k?" on":""}" data-a="sub" data-v="${k}">${l}</button>`
    });
    o+=`</div>`;
    // Info
    const weakCount=S.scope==="薄弱"?S.uk.size:s.t;
    o+=`<div class="info"><span>${S.scope==="薄弱"?"薄弱练习":"第 "+(S.idx+1)+"/"+s.t+" 味"} · ${weakCount}味可练</span><span>掌握 ${s.k} · 待巩固 ${s.u}</span></div>`;

    if(S.scope==="薄弱"&&!S.uk.size){
      o+=`<div class="scard fade-in" style="display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-size:16px;color:var(--jade);font-weight:700">暂无薄弱药材</div><div style="font-size:13px;color:var(--ink3);margin-top:8px">在浏览中标记"不熟"即可添加</div></div>`;
    } else {
      const qt=qType(h);
      // Type badge for random
      if(S.sub==="random") o+=`<div style="text-align:center;margin-bottom:6px"><span class="type-badge ${qt==="quiz"?"quiz":"rv"}">${qt==="quiz"?"写药名":"写功效"}</span></div>`;

      if(qt==="quiz"){
        // === 写药名 ===
        const ic=S.qr==="ok"?" ok":S.qr==="no"?" no":"";
        o+=`<div class="scard${an} fade-in"><div class="front-tag" style="text-align:center;justify-content:center;margin-bottom:8px"><span class="dot"></span>${h.cat} · ${h.sub}</div><div class="q-prompt">根据功效与主治，写出药名</div><div class="q-sec"><div class="sec-label eff">功效</div><div class="sec-text">${h.effect}</div></div><div class="q-sec"><div class="sec-label ind">主治</div><div class="sec-text sm">${h.indication}</div></div><div class="q-row"><input id="qi" class="q-input${ic}" value="${S.qi}" placeholder="输入药名..." inputmode="text" autocapitalize="off" autocomplete="off"><button class="q-btn" data-a="check">确认</button></div>${S.qr==="ok"?'<div class="q-result ok">回答正确</div>':""}${S.qr==="no"?`<div class="q-result no">答案：${h.name}</div>`:""}<button class="dose-btn" data-a="dose">${S.dose?"收起用法":"查看用法"}</button>${S.dose&&h.dose?`<div class="dose-box">${h.dose}</div>`:""}</div>`;
      } else {
        // === 写功效 (self grade) ===
        o+=`<div class="scard${an} fade-in"><div class="rv-sub">${h.cat} · ${h.sub}</div><div class="rv-name">${h.name}</div><div class="rv-prompt">请回忆其功效与主治</div>`;
        if(!S.rvShow){
          o+=`<div class="rv-reveal" data-a="rv-reveal">点击查看答案</div>`;
        } else {
          o+=`<div class="rv-reveal shown"><div class="section" style="margin-bottom:10px"><div class="sec-label eff">功效</div><div class="sec-text">${h.effect}</div></div><div class="section" style="margin-bottom:0"><div class="sec-label ind">主治</div><div class="sec-text sm">${h.indication}</div></div>${h.dose?`<div style="margin-top:8px;font-size:11px;color:var(--amber)">${h.dose}</div>`:""}</div>`;
          o+=`<div class="rv-grade"><button class="g-no" data-a="rv-no">没记住</button><button class="g-ok" data-a="rv-ok">记住了</button></div>`;
        }
        o+=`</div>`;
      }
      o+=`<div class="nav"><button class="nbtn outline" data-a="prev">← 上</button><button class="nbtn primary" data-a="next">下 →</button></div>`;
    }
  }

  // ===== PROGRESS =====
  else if(S.mode==="progress"){
    const allS=stats();
    o+=`<div class="streak-row"><div class="streak-card"><div class="streak-num" style="color:var(--vermilion)">${P.streak}</div><div class="streak-label">连续打卡/天</div></div><div class="streak-card"><div class="streak-num" style="color:var(--jade)">${Object.keys(P.days).length}</div><div class="streak-label">累计学习/天</div></div><div class="streak-card"><div class="streak-num" style="color:var(--amber)">${allS.p}%</div><div class="streak-label">总体完成</div></div></div>`;

    o+=`<div class="dash-section"><div class="dash-title">学习日历</div>`;
    const wk=["一","二","三","四","五","六","日"];
    o+=`<div class="cal-weekdays">`;wk.forEach(w=>{o+=`<div>${w}</div>`});o+=`</div><div class="cal-grid">`;
    const todayStr=today(),sd=new Date();sd.setDate(sd.getDate()-34);
    const dw=sd.getDay(),mo=dw===0?6:dw-1;sd.setDate(sd.getDate()-mo);
    for(let i=0;i<35;i++){const d=new Date(sd);d.setDate(d.getDate()+i);const ds=d.toISOString().slice(0,10);const rec=P.days[ds],n=rec?rec.n:0;const isT=ds===todayStr;const isE=d>new Date();let cls="cal-day";if(isE)cls+=" empty";else if(n>=5)cls+=" studied-high";else if(n>0)cls+=" studied";if(isT)cls+=" today";o+=`<div class="${cls}" title="${ds}: ${n}味">${d.getDate()}</div>`}
    o+=`</div><div class="cal-legend"><span>浅色=1-4味</span><span>深色=5+味</span></div></div>`;

    o+=`<div class="dash-section"><div class="dash-title">分类统计</div>`;
    cats.filter(c=>c!=="全部").forEach(cat=>{const cs=stats(cat),pct=cs.t?Math.round((cs.k/cs.t)*100):0;o+=`<div class="cat-bar-row"><div class="cat-bar-name">${cat}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;opacity:${pct?1:.3}"></div></div><div class="cat-bar-pct">${cs.k}/${cs.t}</div></div>`});
    o+=`</div>`;

    o+=`<div class="dash-section"><div class="dash-title">薄弱药材 <span style="font-size:12px;font-weight:400;color:var(--ink3)">(${S.uk.size}味)</span></div>`;
    if(S.uk.size){o+=`<div class="weak-pills">`;D.filter(x=>S.uk.has(x.id)).forEach(x=>{o+=`<span class="weak-pill">${x.name}</span>`});o+=`</div>`}else o+=`<div class="weak-empty">暂无薄弱药材，继续保持</div>`;
    o+=`</div>`;

    o+=`<div class="dash-actions"><button class="dash-btn" data-a="export">导出进度</button><button class="dash-btn" data-a="import">导入进度</button><button class="dash-btn danger" data-a="reset">重置进度</button></div><input type="file" id="file-in" accept=".json" style="display:none">`;
  }

  // Stats footer
  if(S.mode!=="progress"){
    o+=`<div class="stats"><div><div class="s-num s-jade">${s.k}</div><div class="s-label">已掌握</div></div><div><div class="s-num s-red">${s.u}</div><div class="s-label">待巩固</div></div><div><div class="s-num s-mute">${s.t-s.k-s.u}</div><div class="s-label">未学习</div></div><div><div class="s-num s-acc">${s.p}%</div><div class="s-label">完成度</div></div></div>`;
  }
  a.innerHTML=o;S.anim="";
  const qi=document.getElementById("qi");if(qi){qi.focus();qi.selectionStart=qi.selectionEnd=qi.value.length}
}

function resetUI(){S.flip=false;S.qi="";S.qr=null;S.dose=false;S.rvShow=false}
function goNext(){const f=filtered();resetUI();S.idx=(S.idx+1)%(f.length||1);S.anim="slide-l";S.rtype=Math.random()>.5?"quiz":"reverse";R()}
function goPrev(){const f=filtered();resetUI();S.idx=(S.idx-1+(f.length||1))%(f.length||1);S.anim="slide-r";S.rtype=Math.random()>.5?"quiz":"reverse";R()}
function markHerb(known){const h=herb();if(known){S.kn.add(h.id);S.uk.delete(h.id)}else{S.uk.add(h.id);S.kn.delete(h.id)}saveProg();recordStudy(1);resetUI();const f2=filtered();if(f2.length===0){S.idx=0;R();return}if(S.idx>=f2.length)S.idx=f2.length-1;S.anim="slide-l";R()}

document.getElementById("app").addEventListener("click",e=>{
  const b=e.target.closest("[data-a]");if(!b)return;
  const act=b.dataset.a,val=b.dataset.v;
  if(act==="mode"){S.mode=val;resetUI();if(val==="practice"){if(!scopeCats.includes(S.scope))S.scope="全部";S.idx=0}else if(val==="browse"){if(!cats.includes(S.scope))S.scope="全部";S.idx=0}else{S.idx=0}R()}
  else if(act==="scope"){S.scope=val;S.idx=0;resetUI();R()}
  else if(act==="sub"){S.sub=val;resetUI();R()}
  else if(act==="flip"){S.flip=!S.flip;R()}
  else if(act==="next")goNext();
  else if(act==="prev")goPrev();
  else if(act==="kn"){markHerb(true);goNext()}
  else if(act==="uk"){markHerb(false);goNext()}
  else if(act==="check"){const h=herb(),v=S.qi.trim();if(!v)return;if(v===h.name){S.qr="ok";S.kn.add(h.id);S.uk.delete(h.id)}else{S.qr="no";S.uk.add(h.id)}saveProg();recordStudy(1);R()}
  else if(act==="rv-reveal"){S.rvShow=true;R()}
  else if(act==="rv-ok"){S.kn.add(herb().id);S.uk.delete(herb().id);saveProg();recordStudy(1);goNext()}
  else if(act==="rv-no"){S.uk.add(herb().id);S.kn.delete(herb().id);saveProg();recordStudy(1);goNext()}
  else if(act==="dose"){S.dose=!S.dose;R()}
  else if(act==="export"){const blob=new Blob([JSON.stringify(P,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="本草进度_"+today()+".json";a.click();URL.revokeObjectURL(url)}
  else if(act==="import"){document.getElementById("file-in").click()}
  else if(act==="reset"){if(confirm("确定要重置所有学习进度吗？")){P={kn:[],uk:[],days:{},streak:0,last:null};S.kn=new Set;S.uk=new Set;S.idx=0;resetUI();saveProg();R()}}
});
document.getElementById("app").addEventListener("input",e=>{if(e.target.id==="qi"){S.qi=e.target.value;S.qr=null}});
document.getElementById("app").addEventListener("keydown",e=>{
  if(e.target.id==="qi"&&e.key==="Enter"){const h=herb(),v=S.qi.trim();if(!v)return;if(v===h.name){S.qr="ok";S.kn.add(h.id);S.uk.delete(h.id)}else{S.qr="no";S.uk.add(h.id)}saveProg();recordStudy(1);R()}
});
document.getElementById("app").addEventListener("change",e=>{
  if(e.target.id==="file-in"){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);P=data;saveProg();S.kn=new Set(P.kn);S.uk=new Set(P.uk);R();alert("导入成功")}catch(err){alert("导入失败：文件格式不正确")}};reader.readAsText(file)}
});
let tx=0,ty=0,tt=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now()},{passive:true});
document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty,dt=Date.now()-tt;if(dt>500)return;if(!e.target.closest(".card-scene,.scard"))return;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?goNext():goPrev()}},{passive:true});
document.addEventListener("keydown",e=>{
  if(S.mode==="practice"&&document.activeElement?.tagName==="INPUT")return;
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();goNext()}
  if(e.key==="ArrowLeft"){e.preventDefault();goPrev()}
  if(e.key==="Enter"&&S.mode==="browse"){e.preventDefault();S.flip=!S.flip;R()}
});
R();
</script>
</body>
</html>
